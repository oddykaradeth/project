<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Popup Image Gallery</title>
<style>
  
  /* --- Page behind the popup, just so there's something to open the gallery from --- */
  .page{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:60px 20px;
  }
  .open-btn{
    background:#fff;
    color:#111;
    border:none;
    padding:14px 26px;
    font-size:15px;
    border-radius:6px;
    cursor:pointer;
    font-weight:600;
  }

  /* --- Lightbox overlay --- */
  .lightbox{
    position:fixed;
    inset:0;
    background:var(--overlay-bg);
    display:none;
    flex-direction:column;
    z-index:1000;
  }
  .lightbox.active{
    display:flex;
  }

  .lightbox-header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:28px 40px 0 40px;
    color:var(--text);
    flex-shrink:0;
  }

  .close-btn{
    display:flex;
    align-items:center;
    gap:10px;
    background:none;
    border:none;
    color:var(--text);
    font-size:19px;
    cursor:pointer;
    padding:6px 8px;
    border-radius:6px;
    transition:background .15s ease;
  }
  .close-btn:hover{ background:var(--control-hover); }
  .close-btn svg{ width:20px; height:20px; }

  .gallery-title{
    font-size:20px;
    font-weight:400;
    color:var(--text);
    letter-spacing:0.2px;
  }

  .lightbox-body{
    flex:1;
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px 100px;
    min-height:0;
  }

  .nav-arrow{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    width:56px;
    height:56px;
    border-radius:50%;
    border:1.5px solid var(--control-border);
    background:transparent;
    color:var(--text);
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    transition:background .15s ease, transform .15s ease;
  }
  .nav-arrow:hover{ background:var(--control-hover); }
  .nav-arrow:active{ transform:translateY(-50%) scale(0.94); }
  .nav-arrow svg{ width:22px; height:22px; }
  .nav-arrow.prev{ left:36px; }
  .nav-arrow.next{ right:36px; }
  .nav-arrow:disabled{ opacity:0.3; cursor:default; }

  .image-frame{
    max-width:100%;
    max-height:100%;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .image-frame img{
    max-width:100%;
    max-height:calc(100vh - 220px);
    object-fit:contain;
    display:block;
    user-select:none;
    -webkit-user-drag:none;
  }

  .lightbox-footer{
    padding:0 40px 30px 40px;
    display:flex;
    justify-content:flex-end;
    flex-shrink:0;
  }
  .counter{
    color:var(--text);
    font-size:18px;
    letter-spacing:0.3px;
  }

  @media (max-width: 720px){
    .lightbox-header{ padding:20px 20px 0 20px; }
    .lightbox-body{ padding:20px 16px; }
    .nav-arrow{ width:44px; height:44px; }
    .nav-arrow.prev{ left:8px; }
    .nav-arrow.next{ right:8px; }
    .gallery-title{ font-size:16px; }
    .lightbox-footer{ padding:0 20px 20px 20px; }
  }

  /* Respect reduced motion preference */
  @media (prefers-reduced-motion: reduce){
    .nav-arrow, .close-btn{ transition:none; }
  }
</style>
</head>
<body>

<div class="page">
  <button class="open-btn" id="openGallery">Open Gallery</button>
</div>

<div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Image gallery">
  <div class="lightbox-header">
    <button class="close-btn" id="closeBtn" aria-label="Close gallery">
      <svg viewBox="0 0 0 0" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
        <line x1="5" y1="5" x2="19" y2="19"></line>
        <line x1="19" y1="5" x2="5" y2="19"></line>
      </svg>
      <span>Close</span>
    </button>
    <div class="gallery-title" id="galleryTitle">Pameran Indocomtech</div>
  </div>

  <div class="lightbox-body">
    <button class="nav-arrow prev" id="prevBtn" aria-label="Previous image">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <line x1="19" y1="12" x2="5" y2="12"></line>
        <polyline points="12 19 5 12 12 5"></polyline>
      </svg>
    </button>

    <div class="image-frame">
      <img id="mainImage" src="" alt="Gallery image">
    </div>

    <button class="nav-arrow next" id="nextBtn" aria-label="Next image">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <line x1="5" y1="12" x2="19" y2="12"></line>
        <polyline points="12 5 19 12 12 19"></polyline>
      </svg>
    </button>
  </div>

  <div class="lightbox-footer">
    <div class="counter" id="counter">1 / 1</div>
  </div>
</div>

<script>
(function(){
  // Replace this array with your own image URLs / captions
  const images = [
    { src: "https://picsum.photos/seed/indocomtech1/1600/1000", alt: "Exhibition hall overview" },
    { src: "https://picsum.photos/seed/indocomtech2/1600/1000", alt: "Camera brand booths" },
    { src: "https://picsum.photos/seed/indocomtech3/1600/1000", alt: "Visitors browsing displays" },
    { src: "https://picsum.photos/seed/indocomtech4/1600/1000", alt: "Product showcase counter" },
    { src: "https://picsum.photos/seed/indocomtech5/1600/1000", alt: "Tamron booth with attendees" },
    { src: "https://picsum.photos/seed/indocomtech6/1600/1000", alt: "Crowd at exhibition" },
    { src: "https://picsum.photos/seed/indocomtech7/1600/1000", alt: "Booth staff assisting guests" },
    { src: "https://picsum.photos/seed/indocomtech8/1600/1000", alt: "Technology display wall" },
    { src: "https://picsum.photos/seed/indocomtech9/1600/1000", alt: "Product demonstration area" },
    { src: "https://picsum.photos/seed/indocomtech10/1600/1000", alt: "Hall walkway" },
    { src: "https://picsum.photos/seed/indocomtech11/1600/1000", alt: "Registration desk" },
    { src: "https://picsum.photos/seed/indocomtech12/1600/1000", alt: "Closing shot of the event" }
  ];

  const galleryTitle = "Pameran Indocomtech";
  let currentIndex = 4; // start on image 5 to mirror the reference (5 / 12)

  const lightbox   = document.getElementById('lightbox');
  const mainImage  = document.getElementById('mainImage');
  const counter    = document.getElementById('counter');
  const titleEl    = document.getElementById('galleryTitle');
  const prevBtn    = document.getElementById('prevBtn');
  const nextBtn    = document.getElementById('nextBtn');
  const closeBtn   = document.getElementById('closeBtn');
  const openBtn    = document.getElementById('openGallery');

  function render(){
    const item = images[currentIndex];
    mainImage.src = item.src;
    mainImage.alt = item.alt || '';
    counter.textContent = (currentIndex + 1) + ' / ' + images.length;
    titleEl.textContent = galleryTitle;

    // Loop navigation — remove these two lines if you'd rather disable at the ends
    prevBtn.disabled = false;
    nextBtn.disabled = false;
  }

  function openLightbox(index){
    currentIndex = typeof index === 'number' ? index : currentIndex;
    render();
    lightbox.classList.add('active');
    document.body.style.overflow = 'hidden';
    closeBtn.focus();
  }

  function closeLightbox(){
    lightbox.classList.remove('active');
    document.body.style.overflow = '';
  }

  function showPrev(){
    currentIndex = (currentIndex - 1 + images.length) % images.length;
    render();
  }

  function showNext(){
    currentIndex = (currentIndex + 1) % images.length;
    render();
  }

  openBtn.addEventListener('click', () => openLightbox(4));
  closeBtn.addEventListener('click', closeLightbox);
  prevBtn.addEventListener('click', showPrev);
  nextBtn.addEventListener('click', showNext);

  // Click on the dark backdrop (outside header/body/footer content) closes it
  lightbox.addEventListener('click', (e) => {
    if(e.target === lightbox){ closeLightbox(); }
  });

  // Keyboard support
  document.addEventListener('keydown', (e) => {
    if(!lightbox.classList.contains('active')) return;
    if(e.key === 'Escape') closeLightbox();
    if(e.key === 'ArrowLeft') showPrev();
    if(e.key === 'ArrowRight') showNext();
  });

  // Open automatically on load so the design is visible immediately
  openLightbox(4);
})();
</script>

</body>
</html>
